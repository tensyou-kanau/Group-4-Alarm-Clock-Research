<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>課題研究ポータル</title>
    <style>
        :root {
            --primary-green: #1a2f23;
            --sub-green: #2d5a43;
            --accent-gold: #c5a059; /* 濃緑に合うアクセント色 */
            --bg-color: #f9faf9;
            --white: #ffffff;
        }

        /* 全体設定 */
        * { box-sizing: border-box; }
        body {
            font-family: "Helvetica Neue", Arial, "Hiragino Kaku Gothic ProN", sans-serif;
            margin: 0;
            padding: 0;
            background-color: var(--bg-color);
            color: #333;
            line-height: 1.7;
        }

        /* ヘッダー：スマホでは文字を少し小さく調整 */
        header {
            background-color: var(--primary-green);
            color: var(--white);
            padding: clamp(2rem, 8vw, 4rem) 1rem;
            text-align: center;
        }

        header h1 {
            margin: 0;
            font-size: clamp(1.5rem, 5vw, 2.5rem); /* 画面幅に合わせてサイズが変化 */
            letter-spacing: 0.05em;
        }

        /* ナビゲーション：スマホでは折り返し、PCでは横並び */
        nav {
            background-color: var(--sub-green);
            position: sticky;
            top: 0;
            z-index: 1000;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        nav ul {
            list-style: none;
            margin: 0;
            padding: 0;
            display: flex;
            flex-wrap: wrap; /* 幅が足りない時に折り返す */
            justify-content: center;
        }

        nav li { flex: 1; min-width: 100px; text-align: center; }

        nav a {
            display: block;
            color: var(--white);
            padding: 1rem 0.5rem;
            text-decoration: none;
            font-size: 0.9rem;
            font-weight: bold;
            transition: 0.3s;
        }

        nav a:hover { background-color: var(--primary-green); }

        /* コンテンツエリア */
        .main-wrapper {
            max-width: 1000px;
            margin: 2rem auto;
            padding: 0 1rem; /* スマホ時に端がくっつかないように */
        }

        .card {
            background: var(--white);
            padding: clamp(1.5rem, 5vw, 2.5rem);
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
            margin-bottom: 2rem;
        }

        h2 {
            color: var(--primary-green);
            border-bottom: 2px solid var(--accent-gold);
            padding-bottom: 0.5rem;
            margin-top: 0;
        }

        /* フレックスボックス：PCでは2カラム、スマホでは1カラム */
        .grid {
            display: flex;
            flex-wrap: wrap;
            gap: 1.5rem;
        }

        .grid-item {
            flex: 1;
            min-width: 300px; /* 300px以下になると縦に並ぶ */
        }

        /* 画像をレスポンシブにする設定 */
        img {
            max-width: 100%;
            height: auto;
            border-radius: 8px;
        }

        footer {
            background: var(--primary-green);
            color: var(--white);
            text-align: center;
            padding: 2rem 1rem;
            margin-top: 4rem;
        }

        /* 小さい画面用の微調整 */
        @media (max-width: 480px) {
            nav a { font-size: 0.8rem; padding: 0.8rem 0; }
            .card { padding: 1.2rem; }
        }
    </style>
</head>
<body>

    <header>
        <h1>課題研究プロジェクト</h1>
        <p>Research on Environment & Technology</p>
    </header>

    <nav>
        <ul>
            <li><a href="#section1">序論</a></li>
            <li><a href="#section2">方法</a></li>
            <li><a href="#section3">結果</a></li>
            <li><a href="#section4">考察</a></li>
        </ul>
    </nav>

    <div class="main-wrapper">
        <section id="section1" class="card">
            <h2>1. 研究の背景</h2>
            <div class="grid">
                <div class="grid-item">
                    <p>
                        このテンプレートは、PCで見ると横幅いっぱいに、スマホで見ると自動的に要素が縦に並ぶように設計されています。
                        どの端末で開いても、濃緑の統一感を損なわずに閲覧可能です。
                    </p>
                </div>
                <div class="grid-item">
                    <div style="background: #eef2ef; padding: 1rem; border-radius: 8px; border: 1px dashed var(--sub-green);">
                        <strong>💡 レスポンシブのコツ</strong><br>
                        「width」ではなく「max-width」を使うことで、画面からはみ出るのを防いでいます。
                    </div>
                </div>
            </div>
        </section>

        <section id="section2" class="card">
            <h2>2. 実験結果の図解</h2>
            <p>（ここに図表を配置します）</p>
            <div style="background:#ddd; height: 200px; display: flex; align-items: center; justify-content: center; border-radius: 8px;">
                画像プレースホルダー
            </div>
        </section>
    </div>

    <footer>
        <p>&copy; 2024 課題研究チーム</p>
    </footer>

</body>
</html>
