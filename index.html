<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="description" content="Group 4 Alarm Clock Research - アラームクロック">
    <meta name="theme-color" content="#2c3e50">
    <title>Alarm Clock | Group 4</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* インライン基本スタイル - style.cssが読み込めない場合の フォールバック */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        html, body {
            width: 100%;
            height: 100%;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Oxygen', 'Ubuntu', 'Cantarell', sans-serif;
        }
        
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 10px;
        }
        
        .container {
            background: white;
            border-radius: 15px;
            padding: 20px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
            max-width: 400px;
            width: 100%;
        }
    </style>
</head>
<body>
    <noscript>
        <div style="background: #fff3cd; border: 1px solid #ffc107; color: #856404; padding: 15px; border-radius: 5px; margin: 20px; text-align: center;">
            <p><strong>JavaScriptが有効になっていません</strong></p>
            <p>このアプリケーションを正常に動作させるには、JavaScriptを有効にしてください。</p>
        </div>
    </noscript>

    <div class="container">
        <!-- 時計表示セクション -->
        <div class="clock-display">
            <div class="time" id="time" aria-label="現在時刻">12:00:00</div>
            <div class="date" id="date" aria-label="現在日付">2026-04-24</div>
        </div>

        <!-- アラーム設定セクション -->
        <div class="alarm-section">
            <h2>アラーム設定</h2>
            <div class="input-group">
                <label for="alarm-hour">時間:</label>
                <input 
                    type="number" 
                    id="alarm-hour" 
                    min="0" 
                    max="23" 
                    value="06"
                    inputmode="numeric"
                    aria-label="アラーム時間"
                >
            </div>
            <div class="input-group">
                <label for="alarm-minute">分:</label>
                <input 
                    type="number" 
                    id="alarm-minute" 
                    min="0" 
                    max="59" 
                    value="00"
                    inputmode="numeric"
                    aria-label="アラーム分"
                >
            </div>
            <div class="input-group">
                <label for="alarm-second">秒:</label>
                <input 
                    type="number" 
                    id="alarm-second" 
                    min="0" 
                    max="59" 
                    value="00"
                    inputmode="numeric"
                    aria-label="アラーム秒"
                >
            </div>
            <button id="set-alarm-btn" class="btn btn-primary" aria-label="アラームを設定する">
                アラーム設定
            </button>
        </div>

        <!-- アラームステータスセクション -->
        <div class="alarm-status">
            <h3>アラーム状態</h3>
            <p id="alarm-status-text" role="status" aria-live="polite">アラームは設定されていません</p>
            <button 
                id="cancel-alarm-btn" 
                class="btn btn-danger" 
                disabled
                aria-label="アラームをキャンセルする"
                aria-disabled="true"
            >
                アラームキャンセル
            </button>
        </div>

        <!-- 音量コントロールセクション -->
        <div class="sound-control">
            <h3>音声設定</h3>
            <label for="volume">音量:</label>
            <div class="volume-container">
                <input 
                    type="range" 
                    id="volume" 
                    min="0" 
                    max="100" 
                    value="50"
                    aria-label="音量調整"
                >
                <span id="volume-value" aria-live="polite">50%</span>
            </div>
        </div>
    </div>

    <!-- オーディオ要素 -->
    <audio id="alarm-sound" src="alarm.mp3" preload="auto"></audio>

    <!-- スクリプト読み込み -->
    <script src="script.js"></script>
    
    <!-- フォールバック: script.jsが読み込めない場合 -->
    <script>
        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', initializeApp);
        } else {
            initializeApp();
        }
        
        function initializeApp() {
            // 時間更新機能の基本実装
            function updateTime() {
                const now = new Date();
                const timeElement = document.getElementById('time');
                const dateElement = document.getElementById('date');
                
                if (timeElement) {
                    timeElement.textContent = now.toLocaleTimeString('ja-JP', { 
                        hour12: false,
                        hour: '2-digit',
                        minute: '2-digit',
                        second: '2-digit'
                    });
                }
                
                if (dateElement) {
                    dateElement.textContent = now.toLocaleDateString('ja-JP', {
                        year: 'numeric',
                        month: '2-digit',
                        day: '2-digit'
                    });
                }
            }
            
            updateTime();
            setInterval(updateTime, 1000);
            
            // 音量表示更新
            const volumeInput = document.getElementById('volume');
            const volumeValue = document.getElementById('volume-value');
            
            if (volumeInput && volumeValue) {
                volumeInput.addEventListener('input', function() {
                    volumeValue.textContent = this.value + '%';
                });
            }
        }
    </script>
</body>
</html>
